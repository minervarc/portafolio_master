<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | Minerva Rodríguez-Cabrejas</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #00ff41;
            --window-bg: #1a1a1a;
            --font-mono: 'Courier New', Courier, monospace;
            --comment-color: #7a7a7a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            font-size: 14px;
        }

        .terminal-window {
            width: 100%;
            max-width: 950px;
            background-color: var(--window-bg);
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .terminal-header {
            background-color: #333;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        .terminal-title { margin-left: auto; margin-right: auto; color: #999; font-size: 12px; }

        #terminal-content {
            padding: 25px;
            line-height: 1.6;
            overflow-y: auto;
            flex-grow: 1;
        }

        .line { margin-bottom: 8px; }
        .prompt { color: #888; }
        .command-text { color: #fff; font-weight: bold; }
        .comment { color: var(--comment-color); }
        .highlight { color: #fff; font-weight: bold; text-decoration: none; }

        .input-line {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background-color: #111;
            border-top: 1px solid #222;
        }

        #user-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            flex-grow: 1;
            margin-left: 10px;
        }

        .project-card {
            border: 1px solid #333;
            padding: 15px;
            margin: 10px 0;
            background: #151515;
        }

        .project-card img { width: 100%; max-width: 700px; margin-top: 10px; border: 1px solid #444; }

        /* NUEVA CLASE PARA VÍDEO RESPONSIVE */
        .video-responsive {
            position: relative;
            padding-bottom: 56.25%; /* Proporción 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            margin-top: 15px;
        }
        .video-responsive iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 1px solid #444;
        }

        #terminal-content::-webkit-scrollbar { width: 6px; }
        #terminal-content::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <div class="terminal-title">bash — minerva_portfolio — 80x24</div>
        </div>

        <div id="terminal-content"></div>

        <div class="input-line" id="input-container" style="display: none;">
            <span class="prompt">user@minerva:~$</span>
            <input type="text" id="user-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const content = document.getElementById('terminal-content');
        const inputContainer = document.getElementById('input-container');
        const userInput = document.getElementById('user-input');

        const proyectos = {
            'itinerario_ia': {
                t: 'ITINERARIO IA (2026)',
                d: 'Presentación del Itinerario Formativo “IA en Educación” en la plataforma Aularagon del Centro Aragonés de Tecnologías para la Educación. En este vídeo se explican los objetivos del itinerario, su estructura y el enfoque de aplicación en el aula, con una mirada práctica y accesible para el profesorado.',
                // ENVOLVEMOS EL IFRAME EN EL DIV CON LA CLASE RESPONSIVE
                video: '<div class="video-responsive"><iframe src="https://www.youtube.com/embed/DFdh3Wn-o1g?si=1Iw669JcLL8_uRWc" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>'
            },
            'planeta_blinded': { t: 'PLANETA BLINDED (2021)', d: 'Imagen Digital. Ceguera visual en la era del exceso informativo.', img: 'https://via.placeholder.com/700x350/222/00ff41?text=PLANETA+BLINDED' },
            'diario': { t: 'DIARIO (2021)', d: 'Serie fotográfica sobre procesos de producción diaria.', img: 'https://via.placeholder.com/700x350/333/fff?text=DIARIO' },
            'iconoscotopias': { t: 'ICONOSCOTOPIAS (2013)', d: 'PDF/Ensayo visual. Límites de la visión contemporánea.', img: 'https://via.placeholder.com/700x350?text=ICONOSCOTOPIAS' },
            'cartografias': { t: 'CARTOGRAFÍAS AUDIOVISUALES (2013)', d: 'Video. Mapeado de espacios emocionales.', img: 'https://via.placeholder.com/700x350?text=CARTOGRAFIAS' },
            'segunda_casa': { t: 'MI SEGUNDA CASA (2013)', d: 'Imagen. Reflexión sobre los espacios de docencia.', img: 'https://via.placeholder.com/700x350?text=MI+SEGUNDA+CASA' },
            'callate': { t: 'CÁLLATE (2011)', d: 'Videoarte. Exploración del silencio y la censura.', img: 'https://via.placeholder.com/700x350?text=CALLATE' }
        };

        const statement = `
            <span class="comment">// ARTIST STATEMENT</span><br>
            <span class="comment">En los últimos años me he dedicado a la docencia y a la formación en educación, lo que ha hecho que tristemente haya tenido que dejar de lado la producción artística propia. Mis últimos proyectos artísticos son resultado de mis estudios cursados. Mi intención con este máster es poder volver a conectar con la creación artística y desarrollar obra propia en el marco de mis investigaciones de tesis doctoral, en las que trabajo la Intercreatividad, las RRSS y los videojuegos. <br><br>
            Concretamente, mi intención es desarrollar un proceso de trabajo con una IA propia a la que entrenar con mi propio dataset y poder crear obra de forma colaborativa explorando los conceptos de mi tesis y analizando los límites humano-máquina y la relación que se produce. Estudiar mediante el entrenamiento de modelos propios el papel de la IA más allá de una herramienta, educándola y proponiendo una nueva perspectiva de creación en la línea de Sougwen Chung, Alicia Framis, Pilar Rosado, Patxi Araujo o Jake Elwes entre otros. Actualmente estoy trabajando con el grupo IREIAA del Centro Aragonés de Tecnologías para la Educación, desarrollando diferentes elementos para la integración responsable de la IA en las aulas de la comunidad por medio de Jornadas, Itinerarios formativos para profesorado o guías entre otros.</span>`;

        const initSequence = [
            { t: 'p', c: '<span class="prompt">Last login: ' + new Date().toLocaleString() + '</span>' },
            { t: 'p', c: '<span class="highlight">Minerva Rodríguez-Cabrejas | Candidata Máster en Investigación en Práctica Artística</span>' },
            { t: 'p', c: '<span class="comment">// Bienvenid@, ¿qué quieres ver?</span>' },
            { t: 'p', c: '<span class="comment">// Escribe:</span> <span style="color:#FFFFFF">"proyectos"</span>, <span style="color:#FFFFFF">"bio"</span> o <span style="color:#FFFFFF">"contacto"</span> <span class="comment">en la consola.</span>' }
        ];

        async function init() {
            content.innerHTML = '';
            for (let line of initSequence) {
                await addLine(line.c, line.t, 25);
                await delay(300);
            }
            inputContainer.style.display = 'flex';
            userInput.focus();
        }

        async function addLine(text, tag = 'p', speed = 20) {
            const el = document.createElement(tag);
            el.className = 'line';
            content.appendChild(el);
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        if (text.charAt(i) === '<') {
                            let end = text.indexOf('>', i);
                            el.innerHTML += text.substring(i, end + 1);
                            i = end + 1;
                        } else {
                            el.innerHTML += text.charAt(i);
                            i++;
                        }
                        setTimeout(type, speed);
                    } else {
                        content.scrollTop = content.scrollHeight;
                        resolve();
                    }
                }
                type();
            });
        }

        function delay(ms) { return new Promise(res => setTimeout(res, ms)); }

        userInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = userInput.value.toLowerCase().trim();
                const userLine = document.createElement('p');
                userLine.innerHTML = `<span class="prompt">user@minerva:~$</span> <span class="command-text">${val}</span>`;
                content.appendChild(userLine);
                userInput.value = '';

                switch(val) {
                    case 'proyectos':
                        await addLine('Archivos encontrados: <br>' + Object.keys(proyectos).map(k => `> <span class="highlight" style="color:var(--text-color)">${k}</span>`).join('<br>'));
                        break;
                    case 'bio':
                    case 'statement':
                    case 'sobre-mi':
                        await addLine(statement);
                        break;
                    case 'contacto':
                        await addLine('Email: <span class="comment">rodriguezcabrejasminerva@gmail.com</span><br>LinkedIn: <a href="https://www.linkedin.com/in/minerva-rodr%C3%ADguez-cabrejas/" target="_blank" style="color:inherit">/in/minerva-rodríguez-cabrejas</a>');
                        break;
                    case 'clear':
                        content.innerHTML = '';
                        await init();
                        break;
                    default:
                        if (proyectos[val]) {
                            const p = proyectos[val];
                            // LÓGICA MEJORADA PARA MOSTRAR IMAGEN O VÍDEO
                            let mediaHTML = p.img ? `<img src="${p.img}">` : (p.video ? p.video : '');
                            await addLine(`<div class="project-card"><h2 style="color:#fff">${p.t}</h2><p class="comment">${p.d}</p>${mediaHTML}</div>`);
                        } else {
                            await addLine(`Comando no reconocido. Escribe "proyectos" para ver la lista.`, 'p', 10);
                        }
                }
                content.scrollTop = content.scrollHeight;
            }
        });

        document.addEventListener('click', () => userInput.focus());
        window.onload = init;
    </script>
</body>
</html>
